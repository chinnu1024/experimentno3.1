plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {

    implementation 'org.seleniumhq.selenium:selenium-java:4.20.0'

    testImplementation 'org.testng:testng:7.9.0'

}

application {
    mainClass = 'org.example.Main'
}

tasks.register('prepareDocs', Copy) {

    description = 'Copies HTML, CSS, and images to docs folder.'
    group = 'documentation'

    from('src/main/resources/webpage') {

        include '**/*.html',
                '**/*.css',
                '**/*.js',
                '**/*.png',
                '**/*.jpg',
                '**/*.jpeg',
                '**/*.gif',
                '**/*.svg'
    }

    into("$rootDir/docs")
}

test {
    useTestNG()
}
jar {
    manifest {
        attributes(
                'Main-Class': 'org.example.Main'
        )
    }
}